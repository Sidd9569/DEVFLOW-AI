<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - DevFlow AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand brand-logo" href="/dashboard.html">DevFlow AI</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
<li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
<li class="nav-item"><a class="nav-link active" href="/products">Products</a></li>
<li class="nav-item"><a class="nav-link" href="/sprints">Sprints</a></li>
<li class="nav-item"><a class="nav-link" href="/kanban">Kanban</a></li>
<li class="nav-item"><a class="nav-link" href="/issues">Issues</a></li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown">
                            <i class="bi bi-person-circle"></i> <span id="userName">User</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
<li><a class="dropdown-item" href="/profile">Profile</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="#" id="logoutBtn">Logout</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div class="row mb-4">
            <div class="col-md-6">
                <h2><i class="bi bi-rocket"></i> Products</h2>
            </div>
            <div class="col-md-6 text-end">
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createProductModal">
                    <i class="bi bi-plus-circle"></i> Create Product
                </button>
                <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#aiGeneratorModal">
                    <i class="bi bi-robot"></i> AI Feature Generator
                </button>
            </div>
        </div>

        <div class="row" id="productsGrid"></div>
    </div>

    <div class="modal fade" id="createProductModal" tabindex="-1" aria-labelledby="createProductModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="createProductModalLabel">Create New Product</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="createProductForm">
                        <div class="mb-3">
                            <label class="form-label">Product Name</label>
                            <input type="text" class="form-control" id="productName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" id="productDescription" rows="3"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="createProductBtn">Create</button>
                </div>
            </div>
        </div>
    </div>

        <div class="modal fade" id="aiGeneratorModal" tabindex="-1" aria-labelledby="aiGeneratorModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="aiGeneratorModalLabel"><i class="bi bi-robot"></i> AI Feature Generator</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="aiGeneratorForm">
                        <div class="mb-3">
                            <label class="form-label">Describe your startup idea</label>
                            <textarea class="form-control" id="startupIdea" rows="4" placeholder="E.g., A project management tool for remote teams with AI-powered task prioritization..."></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Product Name</label>
                            <input type="text" class="form-control" id="aiProductName" required>
                        </div>
                    </form>
                    <div id="aiResult" class="mt-3" style="display: none;">
                        <h6>Generated Roadmap:</h6>
                        <div id="aiRoadmapContent"></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="generateAIBtn">
                        <i class="bi bi-magic"></i> Generate
                    </button>
                    <button type="button" class="btn btn-success" id="saveAIBtn" style="display: none;">
                        <i class="bi bi-save"></i> Save Product
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="alertContainer"></div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    <script>
        $(document).ready(function() {
            const token = localStorage.getItem('token');
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            $('#userName').text(`${user.firstName || ''} ${user.lastName || ''}`.trim() || 'User');

            if (!token) {
                window.location.href = '/login.html';
                return;
            }

            $.ajaxSetup({
                headers: { 'Authorization': `Bearer ${token}` }
            });

            function loadProducts() {
                $.get('/api/products', function(response) {
                    if (response.success) {
                        const grid = $('#productsGrid');
                        grid.empty();
                        if (response.products.length === 0) {
                            grid.html('<div class="col-12"><div class="alert alert-info">No products yet. Create your first product!</div></div>');
                            return;
                        }
                        response.products.forEach(product => {
                            grid.append(`
                                <div class="col-md-4 mb-4">
                                    <div class="card h-100 product-card" data-product-id="${product._id}">
                                        <div class="card-body">
                                            <h5 class="card-title">${product.name}</h5>
                                            <p class="card-text">${product.description || 'No description'}</p>
                                            <span class="badge bg-${product.status === 'active' ? 'success' : product.status === 'archived' ? 'secondary' : 'info'}">${product.status}</span>
                                        </div>
                                        <div class="card-footer">
<a href="/kanban?product=${product._id}" class="btn btn-sm btn-primary">View Board</a>
                                            <button class="btn btn-sm btn-danger delete-product" data-id="${product._id}">Delete</button>
                                        </div>
                                    </div>
                                </div>
                            `);
                        });
                    }
                });
            }

            loadProducts();

            $('#createProductBtn').on('click', async function() {
                const name = $('#productName').val();
                const description = $('#productDescription').val();
                if (!name) return;
                try {
                    const response = await $.ajax({
                        url: '/api/products',
                        method: 'POST',
                        contentType: 'application/json',
                        data: JSON.stringify({ name, description })
                    });
                    if (response.success) {
                        $('#createProductModal').modal('hide');
                        $('#createProductForm')[0].reset();
                        loadProducts();
                        $('#alertContainer').html('<div class="alert alert-success">Product created successfully!</div>');

                        try {
                            const profileResponse = await $.ajax({
                                url: '/api/profile',
                                method: 'GET',
                                dataType: 'json'
                            });
                            if (profileResponse.success && profileResponse.user) {
                                localStorage.setItem('user', JSON.stringify(profileResponse.user));
                            } else {
                                const currentUser = JSON.parse(localStorage.getItem('user') || '{}');
                                currentUser.products = currentUser.products || [];
                                if (response.product && !currentUser.products.some(p => p._id === response.product._id)) {
                                    currentUser.products.push(response.product);
                                }
                                localStorage.setItem('user', JSON.stringify(currentUser));
                            }
                        } catch (profileError) {
                            const currentUser = JSON.parse(localStorage.getItem('user') || '{}');
                            currentUser.products = currentUser.products || [];
                            if (response.product && !currentUser.products.some(p => p._id === response.product._id)) {
                                currentUser.products.push(response.product);
                            }
                            localStorage.setItem('user', JSON.stringify(currentUser));
                            console.error('Profile refresh failed after product creation', profileError);
                        }
                    }
                } catch (error) {
                    $('#alertContainer').html('<div class="alert alert-danger">Failed to create product</div>');
                }
            });

$('#generateAIBtn').on('click', async function() {
                const startupIdea = $('#startupIdea').val();
                const productName = $('#aiProductName').val();
                if (!startupIdea || !productName) {
                    alert('Please enter both startup idea and product name');
                    return;
                }
                
                $(this).prop('disabled', true).html('<span class="spinner-border spinner-border-sm"></span> Generating with AI...');
                
                try {
                    const response = await $.ajax({
                        url: '/api/ai/generate',
                        method: 'POST',
                        contentType: 'application/json',
                        data: JSON.stringify({ startupIdea, productName }),
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (response.success && response.roadmap) {
                        const roadmap = response.roadmap;
                        let html = '<div class="roadmap-phases">';
                        roadmap.phases.forEach((phase, index) => {
                            html += `
                                <div class="phase-card mb-3 p-3 border rounded">
                                    <h6 class="text-primary">${phase.phase}</h6>
                                    <p class="text-muted small">${phase.description}</p>
                                    <p class="small"><strong>Duration:</strong> ${phase.duration}</p>
                                    <strong>Features:</strong>
                                    <ul class="small mb-0">
                                        ${phase.features.map(f => `<li>${f}</li>`).join('')}
                                    </ul>
                                </div>
                            `;
                        });
                        html += '</div>';
                        $('#aiRoadmapContent').html(html);
                        $('#aiResult').show();
                        $('#saveAIBtn').show();
                    } else {
                        $('#alertContainer').html('<div class="alert alert-danger">Failed to generate roadmap. Please try again.</div>');
                    }
                } catch (error) {
                    console.error('AI generation error:', error);
                    $('#alertContainer').html('<div class="alert alert-danger">Error generating roadmap. Please try again.</div>');
                } finally {
                    $('#generateAIBtn').prop('disabled', false).html('<i class="bi bi-magic"></i> Generate');
                }
            });

            $('#saveAIBtn').on('click', async function() {
                const productName = $('#aiProductName').val();
                const startupIdea = $('#startupIdea').val();
                try {
                    const response = await $.ajax({
                        url: '/api/products',
                        method: 'POST',
                        contentType: 'application/json',
                        data: JSON.stringify({ 
                            name: productName, 
                            description: startupIdea,
                            startupIdea,
                            aiGenerated: true 
                        })
                    });
                    if (response.success) {
                        $('#aiGeneratorModal').modal('hide');
                        $('#aiGeneratorForm')[0].reset();
                        $('#aiResult').hide();
                        $('#saveAIBtn').hide();
                        loadProducts();
                        $('#alertContainer').html('<div class="alert alert-success">AI-generated product saved!</div>');
                    }
                } catch (error) {
                    $('#alertContainer').html('<div class="alert alert-danger">Failed to save product</div>');
                }
            });

            $(document).on('click', '.delete-product', async function() {
                if (!confirm('Are you sure you want to delete this product?')) return;
                const id = $(this).data('id');
                try {
                    await $.ajax({
                        url: `/api/products/${id}`,
                        method: 'DELETE'
                    });
                    loadProducts();
                    $('#alertContainer').html('<div class="alert alert-success">Product deleted successfully!</div>');
                } catch (error) {
                    $('#alertContainer').html('<div class="alert alert-danger">Failed to delete product</div>');
                }
            });

            $('#logoutBtn').on('click', function() {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                window.location.href = '/login.html';
            });
        });
    </script>
</body>
</html>
