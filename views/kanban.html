<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Board - DevFlow AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand brand-logo" href="/dashboard.html">DevFlow AI</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
<li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
<li class="nav-item"><a class="nav-link" href="/products">Products</a></li>
<li class="nav-item"><a class="nav-link" href="/sprints">Sprints</a></li>
<li class="nav-item"><a class="nav-link active" href="/kanban">Kanban</a></li>
<li class="nav-item"><a class="nav-link" href="/issues">Issues</a></li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown">
                            <i class="bi bi-person-circle"></i> <span id="userName">User</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
<li><a class="dropdown-item" href="/profile">Profile</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="#" id="logoutBtn">Logout</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div class="row mb-4">
            <div class="col-md-6">
                <h2><i class="bi bi-kanban"></i> Kanban Board</h2>
                <select class="form-select d-inline-block w-auto ms-3" id="productSelect" style="width: 200px;"></select>
                <select class="form-select d-inline-block w-auto" id="sprintSelect" style="width: 200px;">
                    <option value="">All Sprints</option>
                </select>
            </div>
            <div class="col-md-6 text-end">
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createTaskModal">
                    <i class="bi bi-plus-circle"></i> New Task
                </button>
            </div>
        </div>

        <div class="kanban-board">
            <div class="kanban-column" data-status="todo">
                <div class="column-header todo-header">
                    <h5><i class="bi bi-circle"></i> Todo</h5>
                    <span class="task-count" id="todoCount">0</span>
                </div>
                <div class="column-tasks" id="todoTasks"></div>
            </div>
            <div class="kanban-column" data-status="in-progress">
                <div class="column-header progress-header">
                    <h5><i class="bi bi-arrow-repeat"></i> In Progress</h5>
                    <span class="task-count" id="inProgressCount">0</span>
                </div>
                <div class="column-tasks" id="inProgressTasks"></div>
            </div>
            <div class="kanban-column" data-status="testing">
                <div class="column-header testing-header">
                    <h5><i class="bi bi-bug"></i> Testing</h5>
                    <span class="task-count" id="testingCount">0</span>
                </div>
                <div class="column-tasks" id="testingTasks"></div>
            </div>
            <div class="kanban-column" data-status="done">
                <div class="column-header done-header">
                    <h5><i class="bi bi-check-circle"></i> Done</h5>
                    <span class="task-count" id="doneCount">0</span>
                </div>
                <div class="column-tasks" id="doneTasks"></div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="createTaskModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Create New Task</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="createTaskForm">
                        <div class="mb-3">
                            <label class="form-label">Task Title</label>
                            <input type="text" class="form-control" id="taskTitle" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" id="taskDescription" rows="3"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Priority</label>
                            <select class="form-select" id="taskPriority">
                                <option value="low">Low</option>
                                <option value="medium" selected>Medium</option>
                                <option value="high">High</option>
                                <option value="critical">Critical</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Story Points</label>
                            <input type="number" class="form-control" id="taskPoints" min="0" max="13" value="3">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Due Date</label>
                            <input type="date" class="form-control" id="taskDueDate">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="createTaskBtn">Create Task</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="taskDetailModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="taskDetailTitle">Task Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="taskDetailBody"></div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-danger" id="deleteTaskBtn">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <div id="alertContainer"></div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    <script src="/js/kanban.js"></script>
</body>
</html>
